################################################################################
# CONFIGURAÇĂO DO SERVIÇO DE HISTÓRICO (READ-MODEL)
# @service history-service
# @description Microserviço focado em consultas analíticas e histórico via GraphQL.
# @author Erick Calazăes
# @since 24/03/2026
################################################################################

# Identificaçăo da aplicaçăo no ecossistema
spring.application.name=history-service

# Porta de execuçăo (Diferenciada para conviver com Scheduling e Notification)
server.port=8083

#-------------------------------------------------------------------------------
# PERSISTĘNCIA DE DADOS (POSTGRESQL - CQRS READ DATABASE)
# Banco de dados otimizado para leitura e consultas históricas.
#-------------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/history_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# update: Mantém a estrutura de tabelas sincronizada com as entidades de histórico.
spring.jpa.hibernate.ddl-auto=update

#-------------------------------------------------------------------------------
# CONFIGURAÇĂO GRAPHQL / GRAPHIQL
# Ferramenta para execuçăo de queries flexíveis no histórico de agendamentos.
#-------------------------------------------------------------------------------
# Habilita a interface /graphiql para testar queries e mutations no navegador.
spring.graphql.graphiql.enabled=true

#-------------------------------------------------------------------------------
# MENSAGERIA (RABBITMQ - CONSUMER)
# Conexăo para ouvir os eventos do Scheduling Service e popular o histórico.
#-------------------------------------------------------------------------------
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

#-------------------------------------------------------------------------------
# SEGURANÇA BÁSICA (PROTOTIPAÇĂO)
# Configuraçăo temporária de credenciais em memória para acesso inicial.
#-------------------------------------------------------------------------------
spring.security.user.name=admin
spring.security.user.password=admin