spring.application.name=history-service

server.port=8083

# Conex„o com o PostgreSQL (Banco exclusivo do HistÛrico)
spring.datasource.url=jdbc:postgresql://localhost:5432/history_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# Ativar a interface visual do GraphQL (Isso vai salvar sua vida nos testes)
spring.graphql.graphiql.enabled=true



# ConfiguraÁıes do RabbitMQ (Para ele ouvir as consultas agendadas depois)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ConfiguraÁıes do Spring Security (Mock para testes iniciais)
spring.security.user.name=admin
spring.security.user.password=admin