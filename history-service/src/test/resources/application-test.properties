# Nome da aplicação para o contexto de teste
spring.application.name=history-service-test

# Banco H2 em memória com modo de compatibilidade PostgreSQL
spring.datasource.url=jdbc:h2:mem:history_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Desativa a conexão real com o RabbitMQ para não travar o teste
spring.rabbitmq.host=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Log de SQL para ajudar a debugar falhas nos assertions
spring.jpa.show-sql=true

# Permite que @MockBean sobrescreva definições reais
spring.main.allow-bean-definition-overriding=true