################################################################################
# CONFIGURAÇĂO DE AMBIENTE DE TESTE (PROFILE: TEST)
# @description Define o comportamento do sistema durante a execuçăo de JUnit/Integration Tests.
# @strategy Isolamento total de dependęncias externas (Mocking & In-memory).
# @author Erick Calazăes
# @since 24/03/2026
################################################################################

#-------------------------------------------------------------------------------
# BANCO DE DADOS EM MEMÓRIA (H2)
# Substitui o PostgreSQL para garantir que os testes năo afetem dados reais
# e rodem com alta performance na memória RAM.
#-------------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ddl-auto=create-drop: Cria o schema no início do teste e apaga ao finalizar.
spring.jpa.hibernate.ddl-auto=create-drop

#-------------------------------------------------------------------------------
# ISOLAMENTO DE MENSAGERIA (RABBITMQ)
# Exclui a auto-configuraçăo do RabbitMQ para evitar que o contexto do Spring
# tente conectar a um broker inexistente durante os testes.
#-------------------------------------------------------------------------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

#-------------------------------------------------------------------------------
# CONFIGURAÇŐES DE CONTEXTO
# Permite a substituiçăo de definiçőes de beans, útil para injetar Mocks ou Spies.
#-------------------------------------------------------------------------------
spring.main.allow-bean-definition-overriding=true