spring.application.name=notification-service

# Porta diferente para rodar junto com o Agendamento
server.port=8082

# Conexão com o RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Dados do seu print do Mailtrap
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=1b4f234594d5cb
spring.mail.password=0d30b22f976466
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configurações do PostgreSQL (Conforme seu docker-compose.yml)
spring.datasource.url=jdbc:postgresql://localhost:5432/notification_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# (Opcional) Este serviço não precisa de banco de dados por enquanto,
# a menos que você queira salvar um log das notificações enviadas.
