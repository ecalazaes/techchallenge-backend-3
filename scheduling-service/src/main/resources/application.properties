spring.application.name=scheduling-service

# Porta do servińo de Agendamento (Crucial para nŃo dar conflito com os outros servińos)
server.port=8081

# Configurań§es do PostgreSQL (Conforme seu docker-compose.yml)
spring.datasource.url=jdbc:postgresql://localhost:5432/scheduling_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html

# Comportamento do Hibernate
# 'update' cria a tabela tb_appointments automaticamente se ela nŃo existir
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurań§es do RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Configurań§es do Spring Security (Apenas para desativar o log chato de senha gerada no console)
spring.security.user.name=admin
spring.security.user.password=admin