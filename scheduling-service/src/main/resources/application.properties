################################################################################
# CONFIGURAÇÃO DO SERVIÇO DE AGENDAMENTO (CORE)
# @service scheduling-service
# @description Microserviço principal responsável pela gestão de consultas e usuários.
# @author Erick Calazães
# @since 24/03/2026
################################################################################

# Identificação da aplicação no ecossistema
spring.application.name=scheduling-service

# Porta de execução padrão
server.port=8081

#-------------------------------------------------------------------------------
# PERSISTÊNCIA DE DADOS (POSTGRESQL)
# Armazena usuários, roles, médicos e o histórico de agendamentos.
#-------------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/scheduling_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate/JPA
# update: Garante a evolução do schema sem perda de dados em desenvolvimento.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#-------------------------------------------------------------------------------
# DOCUMENTAÇÃO DA API (SWAGGER/OPENAPI)
# Centraliza a interface de teste dos endpoints para desenvolvedores.
#-------------------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html

#-------------------------------------------------------------------------------
# CONFIGURAÇÕES DE MENSAGERIA (RABBITMQ)
# Conexão para envio de eventos (Producers) para os serviços de Notificação e Histórico.
#-------------------------------------------------------------------------------
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest