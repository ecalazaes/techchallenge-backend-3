# 1. Banco de Dados H2 (Em memˇria, rßpido e isolado)
spring.datasource.url=jdbc:h2:mem:scheduling_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# 2. Desabilitar RabbitMQ Real
# Isso impede que o Spring tente conectar no RabbitMQ do Docker durante os testes
spring.rabbitmq.host=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# 3. Mostrar SQL no log (bom para debugar o teste se algo falhar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Permitir sobrescrever Beans (importante para Mocks)
spring.main.allow-bean-definition-overriding=true