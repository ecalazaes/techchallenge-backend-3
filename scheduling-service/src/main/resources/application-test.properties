################################################################################
# CONFIGURAÇĂO DE AMBIENTE DE TESTE - SCHEDULING SERVICE
# @description Define o perfil 'test' para execuçăo de testes unitários e de integraçăo.
# @strategy Isolamento de infraestrutura (In-memory DB) e Mocks de Mensageria.
# @author Erick Calazăes
# @since 24/03/2026
################################################################################

#-------------------------------------------------------------------------------
# 1. PERSISTĘNCIA EM MEMÓRIA (H2)
# Configuraçăo para alta performance e descarte de dados pós-teste.
# O parâmetro MODE=PostgreSQL emula comportamentos específicos do Postgres no H2.
#-------------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:scheduling_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop: Garante um banco limpo a cada execuçăo da suite de testes.
spring.jpa.hibernate.ddl-auto=create-drop

#-------------------------------------------------------------------------------
# 2. ISOLAMENTO DE MENSAGERIA (RABBITMQ)
# Impede tentativas de conexăo com o broker externo, evitando falhas no contexto.
#-------------------------------------------------------------------------------
spring.rabbitmq.host=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

#-------------------------------------------------------------------------------
# 3. LOGGING E DEBUG DE PERSISTĘNCIA
# Facilita a inspeçăo de queries geradas pelo Hibernate durante falhas de assertions.
#-------------------------------------------------------------------------------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#-------------------------------------------------------------------------------
# 4. FLEXIBILIDADE DE CONTEXTO
# Permite que @MockBean ou @SpyBean substituam definiçőes reais no ApplicationContext.
#-------------------------------------------------------------------------------
spring.main.allow-bean-definition-overriding=true